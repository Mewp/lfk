# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# GoReleaser v2 configuration for the "lfk" CLI tool.
# Docs: https://goreleaser.com
version: 2

builds:
  - id: lfk
    binary: lfk
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/janosmiko/lfk/internal/version.Version={{.Version}}
      - -X github.com/janosmiko/lfk/internal/version.GitCommit={{.ShortCommit}}
      - -X github.com/janosmiko/lfk/internal/version.BuildDate={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: darwin
        formats:
          - zip
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

nfpms:
  - id: lfk
    package_name: lfk
    vendor: janosmiko
    homepage: "https://github.com/janosmiko/lfk"
    maintainer: "janosmiko <janosmiko@users.noreply.github.com>"
    description: "Lightning Fast Kubernetes navigator - keyboard-focused TUI for managing K8s clusters"
    license: Apache-2.0
    formats:
      - deb
      - rpm

dockers:
  - image_templates:
      - "janosmiko/lfk:{{ .Tag }}-amd64"
      - "janosmiko/lfk:latest-amd64"
    use: buildx
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/amd64"
    goarch: amd64
  - image_templates:
      - "janosmiko/lfk:{{ .Tag }}-arm64"
      - "janosmiko/lfk:latest-arm64"
    use: buildx
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/arm64"
    goarch: arm64

docker_manifests:
  - name_template: "janosmiko/lfk:{{ .Tag }}"
    image_templates:
      - "janosmiko/lfk:{{ .Tag }}-amd64"
      - "janosmiko/lfk:{{ .Tag }}-arm64"
  - name_template: "janosmiko/lfk:latest"
    image_templates:
      - "janosmiko/lfk:latest-amd64"
      - "janosmiko/lfk:latest-arm64"

brews:
  - repository:
      owner: janosmiko
      name: homebrew-tap
      token: "{{ .Env.RELEASE_TAP_TOKEN }}"
    directory: Formula
    name: lfk
    homepage: "https://github.com/janosmiko/lfk"
    description: "Lightning Fast Kubernetes navigator - keyboard-focused TUI for managing K8s clusters"
    license: "Apache-2.0"
    dependencies:
      - name: kubectl
        type: optional
      - name: helm
        type: optional
    install: |
      bin.install "lfk"
    test: |
      system "#{bin}/lfk", "--version"

scoops:
  - repository:
      owner: janosmiko
      name: scoop-bucket
      branch: main
      token: "{{ .Env.RELEASE_TAP_TOKEN }}"
    directory: bucket
    name: lfk
    homepage: "https://github.com/janosmiko/lfk"
    description: "Lightning Fast Kubernetes navigator - keyboard-focused TUI for managing K8s clusters"
    license: Apache-2.0
    commit_msg_template: "chore: bump lfk to {{ .Tag }}"

winget:
  - name: lfk
    publisher: janosmiko
    license: Apache-2.0
    homepage: "https://github.com/janosmiko/lfk"
    short_description: "Lightning Fast Kubernetes navigator"
    description: |
      LFK is a lightning-fast, keyboard-focused, yazi-inspired terminal user
      interface for navigating and managing Kubernetes clusters. Built for
      speed and efficiency, it brings a three-column Miller columns layout
      with an owner-based resource hierarchy to your terminal.
    license_url: "https://github.com/janosmiko/lfk/blob/main/LICENSE"
    package_identifier: janosmiko.lfk
    publisher_url: "https://github.com/janosmiko"
    publisher_support_url: "https://github.com/janosmiko/lfk/issues"
    release_notes_url: "https://github.com/janosmiko/lfk/releases/tag/v{{ .Version }}"
    tags:
      - kubernetes
      - tui
      - devops
      - k8s
      - cli
    repository:
      owner: janosmiko
      name: winget-pkgs
      branch: "lfk-{{ .Version }}"
      token: "{{ .Env.WINGET_TOKEN }}"
      pull_request:
        enabled: true
        draft: false
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

chocolateys:
  - name: lfk
    title: "lfk"
    authors: janosmiko
    project_url: "https://github.com/janosmiko/lfk"
    icon_url: "https://raw.githubusercontent.com/janosmiko/lfk/main/docs/imgs/github-header.png"
    copyright: "{{ .Now.Format \"2006\" }} janosmiko"
    license_url: "https://github.com/janosmiko/lfk/blob/main/LICENSE"
    require_license_acceptance: false
    project_source_url: "https://github.com/janosmiko/lfk"
    docs_url: "https://github.com/janosmiko/lfk/blob/main/docs/usage.md"
    bug_tracker_url: "https://github.com/janosmiko/lfk/issues"
    tags: "kubernetes tui devops k8s cli"
    summary: "Lightning Fast Kubernetes navigator"
    description: |
      LFK is a lightning-fast, keyboard-focused, yazi-inspired terminal user
      interface for navigating and managing Kubernetes clusters. Built for
      speed and efficiency, it brings a three-column Miller columns layout
      with an owner-based resource hierarchy to your terminal.
    release_notes: "https://github.com/janosmiko/lfk/releases/tag/v{{ .Version }}"
    api_key: "{{ .Env.CHOCOLATEY_API_KEY }}"
    source_repo: "https://push.chocolatey.org/"
    skip_publish: false

aurs:
  - name: lfk-bin
    homepage: "https://github.com/janosmiko/lfk"
    description: "Lightning Fast Kubernetes navigator - keyboard-focused TUI for managing K8s clusters"
    maintainers:
      - 'janosmiko <janosmiko@users.noreply.github.com>'
    license: Apache-2.0
    private_key: "{{ .Env.AUR_SSH_PRIVATE_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/lfk-bin.git"
    commit_msg_template: "chore: bump lfk-bin to {{ .Tag }}"
    package: |-
      install -Dm755 "./lfk" "${pkgdir}/usr/bin/lfk"
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/lfk-bin/LICENSE"
      install -Dm644 "./README.md" "${pkgdir}/usr/share/doc/lfk-bin/README.md"
    optdepends:
      - 'kubectl: Kubernetes CLI integration'
      - 'helm: Helm release management'
      - 'trivy: Container image vulnerability scanning'

publishers:
  - name: cloudsmith
    ids:
      - lfk
    cmd: |
      bash -c '
        set -euo pipefail
        artifact="{{ .ArtifactPath }}"
        case "${artifact##*.}" in
          deb)
            cloudsmith push deb janosmiko/lfk/any-distro/any-version "${artifact}" --republish
            ;;
          rpm)
            cloudsmith push rpm janosmiko/lfk/any-distro/any-version "${artifact}" --republish
            ;;
          *)
            echo "skipping ${artifact} (not deb or rpm)"
            ;;
        esac
      '
    env:
      - CLOUDSMITH_API_KEY={{ .Env.CLOUDSMITH_API_KEY }}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

checksum:
  name_template: "checksums.txt"

# Keyless cosign signing via Sigstore + GitHub OIDC.
# Requires `id-token: write` permission and `sigstore/cosign-installer` in CI.
#
# Output is a single Sigstore bundle (cert + signature + transparency-log
# entry combined). The previous --output-certificate / --output-signature
# pair was deprecated in cosign v2.5 and broken in v2.6 (the sign-blob
# code path always emits a bundle internally; without --bundle the path
# is empty and the open() call fails).
#
# The `.sigstore` extension is the Sigstore bundle convention and is the
# extension OpenSSF Scorecard recognises as a release signature (see
# probes/releasesAreSigned in github.com/ossf/scorecard). A previous
# `.cosign.bundle` name uploaded successfully but Scorecard reported the
# release as unsigned. Verify with:
#   cosign verify-blob \
#     --bundle checksums.txt.sigstore \
#     --certificate-identity-regexp 'https://github\.com/janosmiko/lfk/.*' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     checksums.txt
signs:
  - cmd: cosign
    signature: "${artifact}.sigstore"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

docker_signs:
  - cmd: cosign
    artifacts: manifests
    output: true
    args:
      - sign
      - "${artifact}@${digest}"
      - "--yes"

sboms:
  - artifacts: archive

release:
  github:
    owner: janosmiko
    name: lfk
