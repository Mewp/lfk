# Builds and publishes a GitHub release (with Homebrew formula) on version tags.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # Runs first (no needs) so a mismatched flake.nix fails the pipeline
  # in seconds instead of waiting on build/test/lint/govulncheck.
  verify-flake-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Verify flake.nix version matches tag
        env:
          TAG_REF: ${{ github.ref }}
        run: |
          TAG="${TAG_REF#refs/tags/}"
          TAG_VERSION="${TAG#v}"
          # Pre-release tags can carry a suffix (e.g. v1.2.3-rc.1); the flake
          # version is always the bare X.Y.Z, so strip everything after the dash.
          BASE_TAG="${TAG_VERSION%%-*}"
          FLAKE_VERSION=$(grep -E '^\s*baseVersion\s*=' flake.nix | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Tag:   $BASE_TAG"
          echo "Flake: $FLAKE_VERSION"
          if [ "$BASE_TAG" != "$FLAKE_VERSION" ]; then
            echo "::error::flake.nix baseVersion ($FLAKE_VERSION) does not match tag ($BASE_TAG)."
            echo "::error::Run 'make release VERSION=$BASE_TAG' (or 'make bump-version') on the commit you want to tag, commit the change, then re-tag."
            exit 1
          fi

  # Builds the Nix flake to confirm vendorHash matches the vendored module set.
  # If a release ships with a stale hash, `nix build` from a tag fails for users
  # (see issue #62). Catching that here is faster than fielding a bug report.
  verify-flake-build:
    needs: [verify-flake-version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Nix
        uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build flake
        id: build
        run: nix build .#default --no-link 2>&1 | tee build.log

      - name: Explain stale-hash failure
        if: failure() && steps.build.outcome == 'failure'
        run: |
          if grep -q "hash mismatch" build.log; then
            echo "::error::Nix flake vendorHash is stale. Run 'make refresh-vendor-hash' locally, commit flake.nix, then re-tag."
          fi

  build-and-test:
    needs: [verify-flake-version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  lint:
    needs: [verify-flake-version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.12.1

  govulncheck:
    needs: [verify-flake-version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: Run govulncheck
        run: govulncheck ./...

  release:
    needs: [build-and-test, lint, govulncheck, verify-flake-version, verify-flake-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # id-token is required for keyless cosign signing via Sigstore OIDC.
      id-token: write
      # attestations is required for actions/attest-build-provenance to publish
      # SLSA provenance attestations on the release artifacts.
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Install syft (SBOM)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      # GoReleaser's chocolateys publisher invokes `choco pack` and `choco push`.
      # crazy-max/ghaction-chocolatey is the standard community action and runs
      # the choco CLI in a Docker container so it works on Linux runners.
      - name: Install Chocolatey CLI
        uses: crazy-max/ghaction-chocolatey@dff3862348493b11fba2fbc49147b6d2dfe09b66 # v4.0.0
        with:
          args: --version

      # GoReleaser's publishers: block invokes the `cloudsmith` CLI to push
      # .deb and .rpm artifacts to cloudsmith.io/janosmiko/lfk. pipx isolates
      # the install from the runner's system Python and is the recommended
      # path per Cloudsmith's docs.
      - name: Install Cloudsmith CLI
        run: |
          pipx install cloudsmith-cli
          cloudsmith --version

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Preflight: verify every required secret is present before GoReleaser
      # starts. Without this, a missing secret causes a confusing mid-publish
      # failure deep in GoReleaser's output.
      - name: Preflight - assert release secrets present
        env:
          RELEASE_TAP_TOKEN: ${{ secrets.RELEASE_TAP_TOKEN }}
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          missing=()
          for s in RELEASE_TAP_TOKEN WINGET_TOKEN CHOCOLATEY_API_KEY CLOUDSMITH_API_KEY DOCKERHUB_USERNAME DOCKERHUB_TOKEN; do
            if [ -z "${!s}" ]; then missing+=("$s"); fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi
          echo "All required secrets present."

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --config .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAP_TOKEN: ${{ secrets.RELEASE_TAP_TOKEN }}
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}

      # Generates SLSA build provenance attestations for every release artifact.
      # GitHub publishes the attestations alongside the release so downstream
      # tools (e.g. OpenSSF Scorecard, `gh attestation verify`) can prove the
      # artifacts were built from this repo at this commit.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
            dist/*.rpm
            dist/*.sbom.json
            dist/checksums.txt
